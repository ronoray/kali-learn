name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          PAYLOAD='{"ref":"main","repo":"kali-learn"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.kali_learn }}" | awk '{print $2}')
          curl -f -X POST https://hungrytimes.in/webhook/deploy-kali-learn \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
          echo "Deploy triggered"
